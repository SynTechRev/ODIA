[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:uvicorn]
command=uvicorn oraculus_di_auditor.interface.api:app --host 127.0.0.1 --port 8000 --workers 2
directory=/app
autostart=true
autorestart=true
stdout_logfile=/var/log/uvicorn.log
stderr_logfile=/var/log/uvicorn.err
environment=PYTHONUNBUFFERED="1"

[program:nextjs]
command=node /app/frontend/standalone/server.js
directory=/app/frontend/standalone
autostart=true
autorestart=true
stdout_logfile=/var/log/nextjs.log
stderr_logfile=/var/log/nextjs.err
environment=PORT="3000",NODE_ENV="production",HOSTNAME="127.0.0.1"

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/var/log/nginx.access.log
stderr_logfile=/var/log/nginx.error.log
